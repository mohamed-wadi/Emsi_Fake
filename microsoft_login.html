<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to your account</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="microsoft_login.css">
</head>
<body>
    <div class="login-box">
        <!-- Step 1: Email -->
        <div id="step-email" class="login-card active">
            <div class="org-logo-container">
                <img src="logo.png" alt="EMSI Logo" class="org-logo">
            </div>
            
            <h1 class="title">Sign in</h1>
            
            <div class="input-container">
                <input type="email" id="email" class="ms-input" placeholder="Email, phone, or Skype" required autocomplete="off">
                <span class="underline"></span>
            </div>
            
            <div id="email-error" class="error-message"></div>

            
            <div class="subtitle">
                No account? <a href="#">Create one!</a>
            </div>
            
            <div class="subtitle">
                <a href="#">Can’t access your account?</a>
            </div>
            
            <div class="button-group">
                <button id="btn-next" class="btn-primary">Next</button>
            </div>
        </div>

        <!-- Step 2: Password -->
        <div id="step-password" class="login-card">
            <div class="org-logo-container">
                <img src="logo.png" alt="EMSI Logo" class="org-logo">
            </div>
            
            <div class="back-nav" id="btn-back">
                <span class="arrow">←</span>
                <span id="display-email" class="user-email">email@example.com</span>
            </div>
            
            <h1 class="title">Enter password</h1>
            
            <div class="input-container">
                <input type="password" id="password" class="ms-input" placeholder="Password" required>
                <span class="underline"></span>
            </div>

            <div id="password-error" class="error-message"></div>
            
            <div class="subtitle">
                <a href="#">Forgot password?</a>
            </div>
            
            <div class="button-group">
                <button id="btn-signin" class="btn-primary">Sign in</button>
            </div>
        </div>
    </div>

    <script>
        // ── Whitelisted accounts ──────────────────────────────────────────────
        const VALID_ACCOUNTS = [
            { email: 'mohammed.wadi@emsi-edu.ma',           password: '1234' },
            { email: 'mohammed.reda.chouikh@emsi-edu.ma',   password: '1234' }
        ];

        const stepEmail    = document.getElementById('step-email');
        const stepPassword = document.getElementById('step-password');
        const btnNext      = document.getElementById('btn-next');
        const btnSignin    = document.getElementById('btn-signin');
        const btnBack      = document.getElementById('btn-back');
        const emailInput   = document.getElementById('email');
        const passwordInput= document.getElementById('password');
        const displayEmail = document.getElementById('display-email');
        const emailError   = document.getElementById('email-error');
        const passwordError= document.getElementById('password-error');

        // ── Step 1: Email validation ──────────────────────────────────────────
        btnNext.addEventListener('click', () => {
            const emailVal = emailInput.value.trim().toLowerCase();

            if (emailVal === '') {
                showEmailError('Entrez une adresse e-mail valide.');
                return;
            }

            if (!emailVal.endsWith('@emsi-edu.ma')) {
                showEmailError('Entrez une adresse e-mail se terminant par @emsi-edu.ma');
                return;
            }

            // Check against whitelist
            const found = VALID_ACCOUNTS.find(a => a.email === emailVal);
            if (!found) {
                showEmailError("Ce compte n'existe pas. Vérifiez l'adresse e-mail ou créez-en un.");
                return;
            }

            // Valid → proceed to password step
            clearEmailError();
            localStorage.setItem('userEmail', emailInput.value.trim());
            displayEmail.textContent = emailInput.value.trim();
            stepEmail.classList.remove('active');
            stepPassword.classList.add('active');
            passwordInput.focus();
        });

        // ── Step 2: Password validation ───────────────────────────────────────
        btnSignin.addEventListener('click', () => {
            const emailVal = (localStorage.getItem('userEmail') || '').toLowerCase();
            const passVal  = passwordInput.value;

            if (passVal === '') {
                showPasswordError('Entrez le mot de passe.');
                return;
            }

            const account = VALID_ACCOUNTS.find(a => a.email === emailVal);
            if (!account || account.password !== passVal) {
                showPasswordError('Mot de passe incorrect. Réessayez.');
                passwordInput.value = '';
                passwordInput.classList.add('input-error');
                passwordInput.focus();
                return;
            }

            // ✅ Authenticated — go to dashboard
            window.location.href = 'dashboard.html';
        });

        // ── Helper functions ──────────────────────────────────────────────────
        function showEmailError(msg) {
            emailError.textContent = msg;
            emailError.style.display = 'block';
            emailInput.classList.add('input-error');
            emailInput.focus();
        }
        function clearEmailError() {
            emailError.style.display = 'none';
            emailInput.classList.remove('input-error');
        }
        function showPasswordError(msg) {
            passwordError.textContent = msg;
            passwordError.style.display = 'block';
        }

        // ── Clear errors while typing ─────────────────────────────────────────
        emailInput.addEventListener('input', clearEmailError);
        passwordInput.addEventListener('input', () => {
            passwordError.style.display = 'none';
            passwordInput.classList.remove('input-error');
        });

        // ── Enter key shortcuts ───────────────────────────────────────────────
        emailInput.addEventListener('keypress',    e => { if (e.key === 'Enter') btnNext.click(); });
        passwordInput.addEventListener('keypress', e => { if (e.key === 'Enter') btnSignin.click(); });

        // ── Back button ───────────────────────────────────────────────────────
        btnBack.addEventListener('click', () => {
            stepPassword.classList.remove('active');
            stepEmail.classList.add('active');
            passwordInput.value = '';
            passwordError.style.display = 'none';
            emailInput.focus();
        });
    </script>
</body>
</html>
