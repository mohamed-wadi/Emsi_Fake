<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to your account</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="microsoft_login.css">
</head>
<body>
    <div class="login-box">
        <!-- Step 1: Email -->
        <div id="step-email" class="login-card active">
            <div class="org-logo-container">
                <img src="logo.png" alt="EMSI Logo" class="org-logo">
            </div>
            
            <h1 class="title">Sign in</h1>
            
            <div class="input-container">
                <input type="email" id="email" class="ms-input" placeholder="Email, phone, or Skype" required autocomplete="off">
                <span class="underline"></span>
            </div>
            
            <div id="email-error" class="error-message"></div>

            
            <div class="subtitle">
                No account? <a href="#">Create one!</a>
            </div>
            
            <div class="subtitle">
                <a href="#">Can’t access your account?</a>
            </div>
            
            <div class="button-group">
                <button id="btn-next" class="btn-primary">Next</button>
            </div>
        </div>

        <!-- Step 2: Password -->
        <div id="step-password" class="login-card">
            <div class="org-logo-container">
                <img src="logo.png" alt="EMSI Logo" class="org-logo">
            </div>
            
            <div class="back-nav" id="btn-back">
                <span class="arrow">←</span>
                <span id="display-email" class="user-email">email@example.com</span>
            </div>
            
            <h1 class="title">Enter password</h1>
            
            <div class="input-container">
                <input type="password" id="password" class="ms-input" placeholder="Password" required>
                <span class="underline"></span>
            </div>
            
            <div class="subtitle">
                <a href="#">Forgot password?</a>
            </div>
            
            <div class="button-group">
                <button id="btn-signin" class="btn-primary">Sign in</button>
            </div>
        </div>
    </div>

    <script>
        const stepEmail = document.getElementById('step-email');
        const stepPassword = document.getElementById('step-password');
        const btnNext = document.getElementById('btn-next');
        const btnSignin = document.getElementById('btn-signin');
        const btnBack = document.getElementById('btn-back');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const displayEmail = document.getElementById('display-email');

        // Go to Password Step
        btnNext.addEventListener('click', () => {
            const emailVal = emailInput.value.trim();
            const errorDiv = document.getElementById('email-error');
            
            if (emailVal === '') {
                errorDiv.textContent = 'Enter a valid email address.';
                errorDiv.style.display = 'block';
                emailInput.classList.add('input-error');
                emailInput.focus();
                return;
            }
            
            if (!emailVal.toLowerCase().endsWith('@emsi-edu.ma')) {
                errorDiv.textContent = 'Enter a valid student email ending with @emsi-edu.ma';
                errorDiv.style.display = 'block';
                emailInput.classList.add('input-error');
                emailInput.focus();
                return;
            }
            
            // Valid email -> save and proceed
            errorDiv.style.display = 'none';
            emailInput.classList.remove('input-error');
            
            localStorage.setItem('userEmail', emailVal);
            
            displayEmail.textContent = emailVal;
            stepEmail.classList.remove('active');
            stepPassword.classList.add('active');
            passwordInput.focus();
        });

        // Hide error when typing
        emailInput.addEventListener('input', () => {
            const errorDiv = document.getElementById('email-error');
            errorDiv.style.display = 'none';
            emailInput.classList.remove('input-error');
        });

        // Trigger on enter key
        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                btnNext.click();
            }
        });

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                btnSignin.click();
            }
        });

        // Go Back to Email Step
        btnBack.addEventListener('click', () => {
            stepPassword.classList.remove('active');
            stepEmail.classList.add('active');
            emailInput.focus();
        });

        // Complete Sign In
        btnSignin.addEventListener('click', () => {
            if (passwordInput.value.trim() === '') {
                passwordInput.focus();
                return;
            }
            // Redirect to EMSI dashboard
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
